satis:
  enabled: true
  features:
    # Dependencies are enforced even when a child feature is set to true:
    # resource-nodes requires machines, market/contracts require storage.
    # missions requires contracts and storage, upgrades requires research, menus requires gui.
    # route-events requires addon-state because it only writes CloudIslands route diagnostics.
    # Event sub-gates such as members, permissions, level-values and warps require lifecycle.
    # Disabled features do not register active commands, GUI listeners, event listeners, tickers,
    # or write paths for that feature. Existing Satis data is preserved for later re-enable.
    # Legacy satismc names are aliases:
    # factories -> machines, generators -> resource-nodes, upgrades -> research, missions -> contracts, menus -> gui.
    commands: true
    machines: true
    storage: true
    factories: true
    generators: true
    upgrades: true
    missions: true
    menus: true
    gui: true
    lifecycle: true
    resource-nodes: true
    market: true
    contracts: true
    research: true
    maintenance: true
    placeholders: true
    migration: true
    addon-state: true
    route-events: true
    members: true
    permissions: true
    level-values: true
    warps: true
    biomes: true
    chat: true
    templates: true
addons:
  cloudislands-satis:
    # Same switch shape as CloudIslands Paper config. If both this block and satis.* are present,
    # both sides must allow a feature before it runs.
    # Set enabled=false to remove the Satis content layer without breaking base CloudIslands islands.
    enabled: true
    database:
      # Host-level addon storage alias. setup.database.* still wins when present.
      # This keeps the addon config shape close to CloudIslands Paper's addon block while
      # preserving the older database.* fallback keys for existing installs.
      type: ""
      path: ""
      shared-directory: ../CloudIslands/satis-state
      sqlite-file: data.db
      jdbc:
        url: ""
        username: ""
        password: ""
    features:
      # This block can be used by host-level addon config. It follows the same disable policy as satis.features.
      # Parent/root disabled forces every Satis runtime feature off, even when a child value is true.
      # Alias and dependency rules are the same as satis.features.
      # Event sub-gates such as members, permissions, level-values and warps require lifecycle.
      commands: true
      machines: true
      storage: true
      factories: true
      generators: true
      upgrades: true
      missions: true
      menus: true
      gui: true
      lifecycle: true
      resource-nodes: true
      market: true
      contracts: true
      research: true
      maintenance: true
      placeholders: true
      migration: true
      addon-state: true
      route-events: true
      members: true
      permissions: true
      level-values: true
      warps: true
      biomes: true
      chat: true
      templates: true
integration:
  # EXTERNAL_ADDON: normal removable plugin/addon mode.
  # BUILT_IN_COMPATIBLE: use the same CloudIslands addon API gates for builds that package Satis together.
  # DISABLED: keep the plugin installed but register no active Satis runtime components.
  # Treat Satis as an official feature pack: CloudIslands Core must keep working when this jar is absent or disabled.
  mode: EXTERNAL_ADDON
  skyblock-provider: CLOUDISLANDS
  cloudislands-adapter: true
  # Used only when CloudIslands region lookup is temporarily unavailable during lifecycle sync.
  # Must match the Paper island-node.cell-size value so Satis can remap state from event cellX/cellZ.
  # A/B node move rule: state is keyed by CloudIslands island UUID, then remapped to the target active world/cell after activation.
  cloudislands-cell-size: 1024
setup:
  database:
    # Empty values inherit from database.* below. Use this block for first-install setup.
    # type: SQLITE, POSTGRESQL, MYSQL, MARIADB, CORE_API
    # Accepted aliases: POSTGRES/PG -> POSTGRESQL, MARIA -> MARIADB,
    # CORE/COREAPI/CLOUDISLANDS/CLOUDISLANDS_API -> CORE_API,
    # IN_MEMORY/MEMORY/LOCAL/LOCAL_SQLITE -> SQLITE.
    # Leave type empty only when one backend is clearly configured. Setup can auto-select
    # POSTGRESQL, MYSQL, or MARIADB when exactly one setup.database.<backend> block has
    # a URL, host/database, username, password, pool, or timeout value.
    # A shared JDBC URL can also select the backend from jdbc:postgresql:, jdbc:mysql:,
    # or jdbc:mariadb:. Unknown JDBC prefixes require setup.database.type to be set.
    # If two or more setup backend blocks are configured, set setup.database.type explicitly.
    # Operational modes:
    # - POSTGRESQL: preferred shared backend for multiple Island nodes.
    # - MYSQL/MARIADB: supported shared backend with the same island_uuid based tables.
    # - CORE_API: stores addon state through CloudIslands Core API table bulk and table/key-value bulk endpoints.
    # - SQLITE: local fallback only; not recommended when A/B Island nodes must share Satis state.
    # CLOUDISLANDS_SATIS_DATABASE_TYPE overrides setup.database.type and database.type.
    type: ""
    path: ""
    shared-directory: ""
    sqlite-file: ""
    core-api:
      # Optional selection marker for CORE_API setup. Empty type still inherits database.type.
      # Requires the CloudIslands API and the addon-state feature to stay enabled.
      enabled: false
      flattened-fallback:
        # If the table/key-value bulk endpoint fails, retry with flattened addon state keys.
        # This keeps older Core API builds and partial endpoint outages from dropping writes.
        # /factory admin state exposes database-core-api-authority-status for cache-only fallback checks.
        enabled: true
    fallback:
      # Empty order inherits database.fallback.order below.
      # Recommended shared fallback order: POSTGRESQL, MYSQL, MARIADB, CORE_API, SQLITE.
      # For production A/B Island node pools, keep at least one shared backend before SQLITE.
      # Put shared backends before SQLITE so temporary DB/API failures do not split state per node.
      # Shared fallback targets are used only when they are explicitly configured through setup,
      # env, jdbc.url, credentials, or database.type. The sample host/database defaults alone
      # are not treated as a ready fallback target.
      # Admin state exposes the resolved safety check as database-fallback-risk,
      # database-fallback-first-shared-backend, and database-fallback-local-position.
      # Env overrides: CLOUDISLANDS_SATIS_DB_FALLBACK_ENABLED, CLOUDISLANDS_SATIS_DB_FALLBACK_ORDER.
      enabled: true
      order: []
    jdbc:
      # Empty values inherit database.jdbc.* below.
      # CLOUDISLANDS_SATIS_JDBC_URL, CLOUDISLANDS_SATIS_DB_USERNAME, and
      # CLOUDISLANDS_SATIS_DB_PASSWORD override config values.
      # A common JDBC URL here can infer setup.database.type from the URL prefix.
      url: ""
      username: ""
      password: ""
      max-pool-size: 0
      connection-timeout-ms: 0
    postgresql:
      # jdbc-url/url wins over host/port/name/database/options when set.
      jdbc-url: ""
      url: ""
      host: ""
      port: 0
      name: ""
      database: ""
      options: ""
      username: ""
      password: ""
      max-pool-size: 0
      connection-timeout-ms: 0
    mysql:
      # jdbc-url/url wins over host/port/name/database/options when set.
      jdbc-url: ""
      url: ""
      host: ""
      port: 0
      name: ""
      database: ""
      options: ""
      username: ""
      password: ""
      max-pool-size: 0
      connection-timeout-ms: 0
    mariadb:
      # jdbc-url/url wins over host/port/name/database/options when set.
      jdbc-url: ""
      url: ""
      host: ""
      port: 0
      name: ""
      database: ""
      options: ""
      username: ""
      password: ""
      max-pool-size: 0
      connection-timeout-ms: 0
settings:
  language: ko_kr
  debug: false
  tick-interval: 20
  tick-period-ticks: 20
  maintenance-check-interval: 1200
  maintenance-check-period-ticks: 1200
  dirty-save-interval: 1200
  dirty-save-period-ticks: 1200
  max-machines-per-cycle: 300
  max-machines-per-tick: 300
  max-backfill-cycles: 60
  offline-production:
    enabled: true
    max-hours: 8
    efficiency: 0.35
  resource-node-link-radius: 3
  allow-coop-build: false
  allow-spawn-island: false
  require-island-member: true
  protect-spawn-island: true
cloudislands:
  allow-coop-build: false
  allow-spawn-island: false
  require-island-member: true
  protect-spawn-island: true
  boosts:
    agriculture-min: 1.0
    agriculture-max: 3.0
    factory-slot-size-divisor: 50
    contract-slot-worth-log-base: 10.0
    max-contract-slot-bonus: 0
resource-nodes:
  link-radius: 3
economy:
  mode: VAULT_PLAYER
  use-vault: true
  currency-symbol: "원"
database:
  # SQLITE, POSTGRESQL, MYSQL, MARIADB, CORE_API.
  # Accepted aliases are the same as setup.database.type:
  # POSTGRES/PG, MARIA, CORE/COREAPI/CLOUDISLANDS/CLOUDISLANDS_API, IN_MEMORY/MEMORY/LOCAL/LOCAL_SQLITE.
  # CORE_API stores Satis table rows as island-scoped CloudIslands addon-state keys and keeps
  # a local SQLite cache for fast runtime reads.
  type: CORE_API
  core-api:
    flattened-fallback:
      enabled: true
  fallback:
    enabled: true
    # Production-safe order keeps a shared backend before local SQLITE.
    # If the active node falls back straight to SQLITE, A/B island servers can split Satis state.
    # Shared targets must be explicitly configured; sample host/database defaults do not trigger
    # Core API fallback by themselves.
    # Check /factory admin state for database-fallback-risk and database-fallback-production-safe.
    order:
      - POSTGRESQL
      - MYSQL
      - MARIADB
      - CORE_API
      - SQLITE
  jdbc:
    # Optional shortcut. If set, it wins over host/database fields.
    # Examples:
    #   jdbc:postgresql://127.0.0.1:5432/cloudislands_satis
    #   jdbc:mysql://127.0.0.1:3306/cloudislands_satis?useSSL=false&allowPublicKeyRetrieval=true
    #   jdbc:mariadb://127.0.0.1:3306/cloudislands_satis
    url: ""
    username: ""
    password: ""
    max-pool-size: 8
    connection-timeout-ms: 5000
  mysql:
    url: ""
    host: "127.0.0.1"
    port: 3306
    database: "cloudislands_satis"
    options: "useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
    username: ""
    password: ""
    max-pool-size: 0
    connection-timeout-ms: 0
  postgresql:
    url: ""
    host: "127.0.0.1"
    port: 5432
    database: "cloudislands_satis"
    options: "sslmode=disable"
    username: ""
    password: ""
    max-pool-size: 0
    connection-timeout-ms: 0
  mariadb:
    url: ""
    host: "127.0.0.1"
    port: 3306
    database: "cloudislands_satis"
    options: "useSSL=false&serverTimezone=UTC"
    username: ""
    password: ""
    max-pool-size: 0
    connection-timeout-ms: 0
  # If you override database.type to SQLITE, use one of these in multi-node CloudIslands setups so A/B island nodes share Satis state.
  # Environment variable CLOUDISLANDS_SATIS_DB has the highest priority for SQLite file paths.
  # Environment variable CLOUDISLANDS_SATIS_JDBC_URL has the highest priority for JDBC backends.
  # Backend-specific JDBC env values are also supported:
  # CLOUDISLANDS_SATIS_POSTGRESQL_JDBC_URL, CLOUDISLANDS_SATIS_MYSQL_JDBC_URL,
  # CLOUDISLANDS_SATIS_MARIADB_JDBC_URL.
  # Backend-specific host field env values are also supported:
  # CLOUDISLANDS_SATIS_POSTGRESQL_HOST/PORT/DATABASE/DB_NAME/OPTIONS,
  # CLOUDISLANDS_SATIS_MYSQL_HOST/PORT/DATABASE/DB_NAME/OPTIONS,
  # CLOUDISLANDS_SATIS_MARIADB_HOST/PORT/DATABASE/DB_NAME/OPTIONS.
  # Other env overrides: CLOUDISLANDS_SATIS_DATABASE_TYPE, CLOUDISLANDS_SATIS_DB_USERNAME,
  # CLOUDISLANDS_SATIS_DB_PASSWORD, CLOUDISLANDS_SATIS_DB_MAX_POOL_SIZE,
  # CLOUDISLANDS_SATIS_DB_CONNECTION_TIMEOUT_MS, CLOUDISLANDS_SATIS_DB_FALLBACK_ENABLED,
  # CLOUDISLANDS_SATIS_DB_FALLBACK_ORDER.
  path: ""
  shared-directory: "../CloudIslands/satis-state"
  sqlite-file: "data.db"
  save-interval-seconds: 60
visuals:
  particles: true
  display-entities: false
  max-display-entities-per-island: 30
storage:
  default-capacity: 10000
limits:
  base-machines-per-island: 50
  base-machine-limit: 50
  machine-limit-per-island-tier: 25
  base-network-limit: 20
  recovery-machine-types:
    - harvester_t1
    - planter_t1
    - miner_drill_t1
    - bio_generator_t1
    - conveyor_t1
