name: CloudIslandsSatis
main: kr.seungmin.satisskyfactory.SatisSkyFactoryPlugin
version: ${version}
description: Official CloudIslands Satis addon without a SuperiorSkyblock2 runtime dependency
api-version: "1.21"
load: POSTWORLD
prefix: CloudIslandsSatis
depend: [CloudIslands]
softdepend: [Vault, PlaceholderAPI]
libraries:
  - org.xerial:sqlite-jdbc:3.46.1.0
  - org.postgresql:postgresql:42.7.4
  - com.mysql:mysql-connector-j:9.1.0
  - org.mariadb.jdbc:mariadb-java-client:3.5.1
  - com.zaxxer:HikariCP:5.1.0
author: LeeSeungmin
website: "mailto:admin@lunaf.kr"
commands:
  factory:
    description: CloudIslands Satis command
    usage: /factory help
    permission: satisskyfactory.use
  sfactory:
    description: CloudIslands Satis command
    usage: /sfactory help
    permission: satisskyfactory.use
permissions:
  satisskyfactory.use:
    default: true
  satisskyfactory.admin:
    default: op
  satisskyfactory.debug:
    default: op
