name: CloudIslandsSatis
main: kr.seungmin.satisskyfactory.SatisSkyFactoryPlugin
version: ${projectVersion}
description: Official CloudIslands Satis addon without a SuperiorSkyblock2 runtime dependency
api-version: "${paperApiBaseline}"
load: POSTWORLD
prefix: CloudIslandsSatis
depend: [CloudIslands]
softdepend: [Vault, PlaceholderAPI]
libraries:
  - org.xerial:sqlite-jdbc:${sqliteJdbcVersion}
  - org.postgresql:postgresql:${postgresqlVersion}
  - com.mysql:mysql-connector-j:${mysqlVersion}
  - org.mariadb.jdbc:mariadb-java-client:${mariadbVersion}
  - com.zaxxer:HikariCP:${hikaricpVersion}
author: LeeSeungmin
website: "mailto:admin@lunaf.kr"
commands:
  factory:
    description: CloudIslands Satis command
    usage: /factory help
    permission: satisskyfactory.use
  sfactory:
    description: CloudIslands Satis command
    usage: /sfactory help
    permission: satisskyfactory.use
permissions:
  satisskyfactory.use:
    default: true
  satisskyfactory.admin:
    default: op
  satisskyfactory.debug:
    default: op
