id: cloudislands-satis
display-name: "CloudIslands Satis"
product-role: official-feature-pack
origin:
  repository: M-LunaFarm/satismc
  dependency-policy: replace-superiorskyblock2-depend-and-api-with-cloudislands-depend-and-api
  legacy-command-roots:
    - factory
    - sfactory
packaging: external-plugin-or-built-in-compatible
requires:
  cloudislands-api: true
  runtime-plugin: CloudIslands
api:
  lookup-policy: CloudIslandsProvider-first-Bukkit-ServicesManager-fallback
  bootstrap-policy: register-if-cloudislands-api-available-disable-runtime-components-when-missing
  core-isolation-policy: core-lifecycle-never-depends-on-satis-jar-or-state
removal:
  safe: true
  data-retention: preserve-addon-state-by-island-uuid
  core-impact: none
  runtime-stop-policy: unregister-satis-commands-listeners-tickers-placeholders-and-state-writers-only
  cloudislands-lifecycle-dependency: false
runtime:
  supported-integration-modes:
    - EXTERNAL_ADDON
    - BUILT_IN_COMPATIBLE
    - DISABLED
  mode-policy: external-addon-and-built-in-compatible-modes-share-cloudislands-addon-feature-gates
  packaging-policy: integration.mode selects external-plugin, built-in-compatible, or disabled-unregistered registry metadata
  owns-islands: false
  storage-key: cloudislands-island-uuid
  default-database-mode: CORE_API
  load-phase: Paper-POSTWORLD-after-CloudIslands
  command-owner: external-addon
  root-switch-gate: addons.cloudislands-satis.enabled&&satis.enabled
  root-switch-policy: disabled-root-switch-forces-all-runtime-features-off-even-when-child-feature-switches-are-true
  disabled-mode: unregister-disabled-commands-no-listeners-no-tickers-no-placeholders-no-core-api-writers
  component-audit:
    active-key: runtime-active-components
    skipped-key: runtime-skipped-components
    blocked-key: runtime-blocked-components
    policy-key: runtime-component-audit
    policy: disabled-features-unregister-commands-and-skip-listeners-tickers-placeholders-core-api-writers-and-dirty-save
database:
  setup-path: setup.database
  default-mode: CORE_API
  supported:
    - CORE_API
    - POSTGRESQL
    - MYSQL
    - MARIADB
    - SQLITE
  shared-state-safe:
    - CORE_API
    - POSTGRESQL
    - MYSQL
    - MARIADB
  local-fallback: SQLITE
  fallback:
    enabled-path: setup.database.fallback.enabled
    order-path: setup.database.fallback.order
    safety-state-keys:
      - database-fallback-risk
      - database-fallback-production-safe
      - database-fallback-first-shared-backend
      - database-fallback-local-position
    recommended-order:
      - POSTGRESQL
      - MYSQL
      - MARIADB
      - CORE_API
      - SQLITE
    split-brain-warning: keep-a-shared-backend-before-sqlite-for-multi-island-node-pools
  core-api:
    setup-path: setup.database.core-api.enabled
    requires:
      - cloudislands-api
      - addon-state
    bulk-endpoints:
      - /v1/addons/state/table/bulk
      - /v1/addons/state/table-key-value/bulk-save
      - /v1/addons/state/table/key-value/bulk-save
      - /v1/addons/state/table/key-value/bulk/save
      - /v1/addons/state/table/key-value/bulk
      - /v1/addons/islands/state/table/bulk
      - /v1/addons/islands/state/table-key-value/bulk-save
      - /v1/addons/islands/state/table/key-value/bulk-save
      - /v1/addons/islands/state/table/key-value/bulk/save
      - /v1/addons/islands/state/table/key-value/bulk
    flattened-fallback-path: setup.database.core-api.flattened-fallback.enabled
  env:
    type: CLOUDISLANDS_SATIS_DATABASE_TYPE
    jdbc-url: CLOUDISLANDS_SATIS_JDBC_URL
    username: CLOUDISLANDS_SATIS_DB_USERNAME
    password: CLOUDISLANDS_SATIS_DB_PASSWORD
    backend-jdbc-url: CLOUDISLANDS_SATIS_POSTGRESQL_JDBC_URL,CLOUDISLANDS_SATIS_MYSQL_JDBC_URL,CLOUDISLANDS_SATIS_MARIADB_JDBC_URL
    backend-host-fields: CLOUDISLANDS_SATIS_POSTGRESQL_HOST/PORT/DATABASE/DB_NAME/OPTIONS,CLOUDISLANDS_SATIS_MYSQL_HOST/PORT/DATABASE/DB_NAME/OPTIONS,CLOUDISLANDS_SATIS_MARIADB_HOST/PORT/DATABASE/DB_NAME/OPTIONS
    backend-credentials: CLOUDISLANDS_SATIS_POSTGRESQL_USERNAME/PASSWORD,CLOUDISLANDS_SATIS_MYSQL_USERNAME/PASSWORD,CLOUDISLANDS_SATIS_MARIADB_USERNAME/PASSWORD
    fallback-enabled: CLOUDISLANDS_SATIS_DB_FALLBACK_ENABLED
    fallback-order: CLOUDISLANDS_SATIS_DB_FALLBACK_ORDER
state:
  authority: core-api-table-key-value-or-shared-database
  move-policy: remap-state-to-current-active-world-and-cell
  ab-node-scenario: save-on-source-node-remap-active-world-and-cell-on-target-node-restore-state-by-island-uuid
  recovery-scenario: heartbeat-expiry-fencing-token-guards-last-confirmed-state-no-duplicate-tick-or-write
  addon-removal-scenario: missing-addon-state-never-blocks-cloudislands-base-island-load
  addon-removal-runtime-action: stop-satis-runtime-preserve-addon-state-leave-cloudislands-islands-loadable
  migration-preflush-policy: flush-dirty-state-before-source-node-deactivation-then-remap-on-target-activation
  fallback-policy: local-cache-on-core-api-failure-with-configurable-database-fallback
  fallback-safety-policy: production-safe-when-shared-backend-precedes-local-sqlite
  placement-source-policy: record-core-payload-or-paper-allocator-on-activate-and-migrate
  placement-source-state-key: last-lifecycle-operation
  node-move-state-keys: source-node,target-node,node-move,node-move-policy
  dirty-save-state-keys: runtime-dirty-save-running,runtime-dirty-save-pending-writes,runtime-dirty-save-pending-machines,runtime-dirty-save-pending-inventories,runtime-dirty-save-pending-nodes,runtime-dirty-save-pending-islands,runtime-dirty-save-stop-policy
  bulk-last-publish-state-keys: last-core-bulk-publish-status,last-core-bulk-publish-mode,last-core-bulk-publish-write-path,last-core-bulk-publish-primary-endpoint,last-core-bulk-publish-fallback-endpoint,last-core-bulk-publish-error,last-core-bulk-publish-pending-retries,last-core-global-bulk-publish-status,last-core-global-bulk-publish-mode,last-core-global-bulk-publish-write-path,last-core-global-bulk-publish-primary-endpoint,last-core-global-bulk-publish-fallback-endpoint,last-core-global-bulk-publish-error,last-core-global-bulk-publish-pending-retries
  bulk-retry-state-keys: addon-state-sync-bulk-max-pending-retries,addon-state-sync-island-bulk-pending-retries,addon-state-sync-island-bulk-retries-queued,addon-state-sync-island-bulk-retries-drained,addon-state-sync-island-bulk-retries-dropped,addon-state-sync-global-bulk-pending-retries,addon-state-sync-global-bulk-retries-queued,addon-state-sync-global-bulk-retries-drained,addon-state-sync-global-bulk-retries-dropped
events:
  source: CloudIslandsAddon.onCloudEvent
  delivery: core-global-events-to-paper-poller-to-cloudislands-addon-and-bukkit-events
  placement-source: activation-and-migration-events-forward-placementSource-to-satis-state
  migration-request-action: preflush-dirty-state-without-coordinate-remap
  coverage:
    - pre-create
    - create
    - pre-activate
    - activate
    - deactivate
    - migrate
    - delete
    - restore
    - reset
    - recovery
    - runtime
    - pre-visit
    - visit
    - member-join
    - member-left
    - member-role
    - permission-check
    - permission-change
    - role-catalog
    - warp-create
    - warp-delete
    - warp-change
    - level
    - worth
    - upgrade
    - limit
    - snapshot
    - route-ticket
superiorskyblock2:
  migration-input-only: true
  runtime-dependency: false
  plugin-yml-dependency: false
  live-provider-hooks: false
  runtime-dependency-whitelist:
    - CloudIslands
    - Vault
    - PlaceholderAPI
  runtime-policy: migration-input-only-no-runtime-hooks
  forbidden-runtime-dependencies:
    - SuperiorSkyblock2
    - BentoBox
    - ASkyBlock
  forbidden-runtime-action: warn-and-ignore-no-service-lookup-no-event-hooks-no-data-writes
  provider-lookup-policy: disabled-at-runtime
  migration-source-policy: read-only-snapshot-or-sqlite-import-no-live-provider-hooks
  replacement-api: CloudIslands API
migration:
  legacy-satismc:
    source: sqlite
    command-root: factory admin migration
    commands:
      status: factory admin migration status
      scan: factory admin migration scan <sqlitePath>
      dryrun: factory admin migration dryrun <sqlitePath>
      verify: factory admin migration verify <sqlitePath>
      import: factory admin migration import <sqlitePath> CONFIRM_IMPORT|CONFIRM_IMPORT:<dryrun-sha256>
      rollback: factory admin migration rollback
    read-only-actions:
      - scan
      - dryrun
      - verify
    write-actions:
      - import
    import-approval-token: CONFIRM_IMPORT
    import-approval-fingerprint-token: CONFIRM_IMPORT:<dryrun-sha256>
    import-mode: cross-backend-sqlite-copy
    conflict-policy: insert-ignore-existing-rows
    rollback-mode: sqlite-snapshot-restore-or-shared-backend-table-restore
    core-api-import-guard: reject-core-api-import-when-addon-state-writer-unavailable
    data-retention: preserve-existing-cloudislands-and-satis-state
features:
  configurable: true
  root-switch: satis.enabled
  parent-switch: addons.cloudislands-satis.enabled
  root-switch-policy: parent-or-root-disabled-forces-all-detailed-switches-off-at-runtime
  aliases:
    factories: machines
    generators: resource-nodes
    upgrades: research
    missions: contracts
    menus: gui
  dependencies:
    resource-nodes: machines
    generators: factories
    market: storage
    contracts: storage
    missions: contracts
    upgrades: research
    menus: gui
    route-events: addon-state
    members: lifecycle
    permissions: lifecycle
    level-values: lifecycle
    warps: lifecycle
    biomes: lifecycle
    chat: lifecycle
    templates: lifecycle
  detailed-switches:
    - commands
    - machines
    - storage
    - factories
    - generators
    - upgrades
    - missions
    - menus
    - gui
    - lifecycle
    - resource-nodes
    - market
    - contracts
    - research
    - maintenance
    - placeholders
    - migration
    - addon-state
    - route-events
    - members
    - permissions
    - level-values
    - warps
    - biomes
    - chat
    - templates
