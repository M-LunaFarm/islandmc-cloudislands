id: cloudislands-satis
display-name: "CloudIslands Satis"
packaging: external-plugin
requires:
  cloudislands-api: true
  runtime-plugin: CloudIslands
api:
  lookup-policy: CloudIslandsProvider-first-Bukkit-ServicesManager-fallback
  bootstrap-policy: register-if-cloudislands-api-available-disable-runtime-components-when-missing
removal:
  safe: true
  data-retention: preserve-addon-state-by-island-uuid
runtime:
  owns-islands: false
  storage-key: cloudislands-island-uuid
  default-database-mode: CORE_API
database:
  setup-path: setup.database
  default-mode: CORE_API
  supported:
    - CORE_API
    - POSTGRESQL
    - MYSQL
    - MARIADB
    - SQLITE
  shared-state-safe:
    - CORE_API
    - POSTGRESQL
    - MYSQL
    - MARIADB
  local-fallback: SQLITE
  fallback:
    enabled-path: setup.database.fallback.enabled
    order-path: setup.database.fallback.order
    recommended-order:
      - POSTGRESQL
      - MYSQL
      - MARIADB
      - CORE_API
      - SQLITE
    split-brain-warning: keep-a-shared-backend-before-sqlite-for-multi-island-node-pools
  core-api:
    setup-path: setup.database.core-api.enabled
    requires:
      - cloudislands-api
      - addon-state
    bulk-endpoints:
      - /v1/addons/state/table-key-value/bulk-save
      - /v1/addons/state/table/key-value/bulk-save
      - /v1/addons/islands/state/table-key-value/bulk-save
      - /v1/addons/islands/state/table/key-value/bulk-save
    flattened-fallback-path: setup.database.core-api.flattened-fallback.enabled
  env:
    type: CLOUDISLANDS_SATIS_DATABASE_TYPE
    jdbc-url: CLOUDISLANDS_SATIS_JDBC_URL
    username: CLOUDISLANDS_SATIS_DB_USERNAME
    password: CLOUDISLANDS_SATIS_DB_PASSWORD
    fallback-enabled: CLOUDISLANDS_SATIS_DB_FALLBACK_ENABLED
    fallback-order: CLOUDISLANDS_SATIS_DB_FALLBACK_ORDER
state:
  authority: core-api-table-key-value-or-shared-database
  move-policy: remap-state-to-current-active-world-and-cell
  fallback-policy: local-cache-on-core-api-failure-with-configurable-database-fallback
  placement-source-policy: record-core-payload-or-paper-allocator-on-activate-and-migrate
  placement-source-state-key: last-lifecycle-operation
events:
  source: CloudIslandsAddon.onCloudEvent
  delivery: core-global-events-to-paper-poller-to-cloudislands-addon-and-bukkit-events
  placement-source: activation-and-migration-events-forward-placementSource-to-satis-state
  coverage:
    - pre-create
    - create
    - pre-activate
    - activate
    - deactivate
    - migrate
    - delete
    - restore
    - reset
    - recovery
    - runtime
    - pre-visit
    - visit
    - member-join
    - member-left
    - member-role
    - permission-check
    - permission-change
    - role-catalog
    - warp-create
    - warp-delete
    - warp-change
    - level
    - worth
    - upgrade
    - limit
    - snapshot
    - route-ticket
superiorskyblock2:
  migration-input-only: true
  runtime-dependency: false
  runtime-policy: migration-input-only-no-runtime-hooks
migration:
  legacy-satismc:
    source: sqlite
    command-root: factory admin migration
    commands:
      status: factory admin migration status
      scan: factory admin migration scan <sqlitePath>
      dryrun: factory admin migration dryrun <sqlitePath>
      verify: factory admin migration verify <sqlitePath>
      import: factory admin migration import <sqlitePath> CONFIRM_IMPORT
      rollback: factory admin migration rollback
    read-only-actions:
      - scan
      - dryrun
      - verify
    write-actions:
      - import
    import-approval-token: CONFIRM_IMPORT
    import-mode: cross-backend-sqlite-copy
    conflict-policy: insert-ignore-existing-rows
    rollback-mode: sqlite-snapshot-restore-or-manual-shared-backend-restore
    core-api-import-guard: reject-core-api-import-when-addon-state-writer-unavailable
    data-retention: preserve-existing-cloudislands-and-satis-state
features:
  configurable: true
  root-switch: satis.enabled
  detailed-switches:
    - commands
    - machines
    - storage
    - factories
    - generators
    - upgrades
    - missions
    - menus
    - gui
    - lifecycle
    - resource-nodes
    - market
    - contracts
    - research
    - maintenance
    - placeholders
    - migration
    - addon-state
    - route-events
