name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: paper-1.21.11
            java: "21"
            minecraft-baseline: "1.21.11"
            compile-task: paper121Compile
            boot-task: paper121BootSmoke
            boot-smoke: "true"
          - platform: paper-26.1
            java: "21"
            minecraft-baseline: "26.1"
            compile-task: paper261Compile
            boot-task: ""
            boot-smoke: "false"
          - platform: paper-26.2
            java: "21"
            minecraft-baseline: "26.2"
            compile-task: paper262Compile
            boot-task: ""
            boot-smoke: "false"
    env:
      CLOUDISLANDS_CI_PLATFORM: ${{ matrix.platform }}
      CLOUDISLANDS_MINECRAFT_BASELINE: ${{ matrix.minecraft-baseline }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Build and test
        run: ./gradlew clean build verifyMinecraftVersionMatrix compileAllMinecraftVersions verifyAdapterPackaging apiCompatibilityCheck distBundle distAddonBundle distChecksums --no-daemon

      - name: Matrix compile
        run: ./gradlew ${{ matrix.compile-task }} --no-daemon

      - name: Stable boot smoke aggregate
        run: ./gradlew bootSmokeAllStableMinecraftVersions --no-daemon

      - name: Boot smoke
        if: matrix.boot-smoke == 'true'
        run: ./gradlew ${{ matrix.boot-task }} velocityBootSmoke --no-daemon

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cloudislands-dist-${{ matrix.platform }}-java${{ matrix.java }}
          path: |
            build/dist/*.zip
            build/dist/checksums-sha256.txt
            build/dist/plugins/*.jar
            build/dist/addons/*.jar
          if-no-files-found: error
