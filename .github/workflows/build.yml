name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build and test
        run: ./gradlew build distBundle distAddonBundle distChecksums --no-daemon

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cloudislands-dist
          path: |
            build/dist/*.zip
            build/dist/checksums-sha256.txt
            build/dist/plugins/*.jar
            build/dist/addons/*.jar
          if-no-files-found: error
