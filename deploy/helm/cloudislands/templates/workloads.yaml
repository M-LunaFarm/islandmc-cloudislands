apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudislands-core
spec:
  replicas: {{ .Values.core.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: core
  template:
    metadata:
      labels:
        app.kubernetes.io/component: core
    spec:
      containers:
        - name: core
          image: "{{ .Values.images.core.repository }}:{{ .Values.images.core.tag }}"
          ports:
            - name: http
              containerPort: {{ .Values.core.port }}
          env:
            - name: CI_BIND
              value: "0.0.0.0"
            - name: CI_PORT
              value: "{{ .Values.core.port }}"
            - name: CI_ADMIN_BIND
              value: {{ .Values.core.adminBind | quote }}
            - name: CI_ADMIN_PORT
              value: "{{ .Values.core.adminPort }}"
            - name: CI_ADMIN_LISTENER_ENABLED
              value: {{ .Values.core.adminListenerEnabled | quote }}
            - name: CI_PUBLIC_ADMIN_API_ENABLED
              value: {{ .Values.core.publicAdminApiEnabled | quote }}
            - name: CI_ALLOW_INSECURE_PUBLIC_HTTP
              value: {{ .Values.core.allowInsecurePublicHttp | quote }}
            - name: CI_DATABASE_TYPE
              value: POSTGRESQL
            - name: CI_JDBC_URL
              value: jdbc:postgresql://cloudislands-postgres:5432/{{ .Values.postgres.database }}
            - name: CI_DB_USERNAME
              value: {{ .Values.postgres.username | quote }}
            - name: CI_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: {{ .Values.secrets.databasePasswordKey }}
            - name: CI_REDIS_URI
              value: redis://cloudislands-redis:6379
            - name: CI_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: {{ .Values.secrets.redisPasswordKey }}
            - name: CI_STORAGE_ENDPOINT
              value: http://cloudislands-object-storage:9000
            - name: CI_STORAGE_BUCKET
              value: {{ .Values.objectStorage.bucket | quote }}
            - name: CI_STORAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: {{ .Values.secrets.storageAccessKeyKey }}
            - name: CI_STORAGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: {{ .Values.secrets.storageSecretKeyKey }}
            - name: CI_CORE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: {{ .Values.secrets.coreTokenKey }}
            - name: CI_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: {{ .Values.secrets.adminTokenKey }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudislands-velocity
spec:
  replicas: {{ .Values.velocity.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: velocity
  template:
    metadata:
      labels:
        app.kubernetes.io/component: velocity
    spec:
      containers:
        - name: velocity
          image: "{{ .Values.images.velocity.repository }}:{{ .Values.images.velocity.tag }}"
          ports:
            - name: minecraft
              containerPort: {{ .Values.velocity.port }}
          env:
            - name: CLOUDISLANDS_CORE_API_BASE_URL
              value: http://cloudislands-core:{{ .Values.core.port }}
            - name: CLOUDISLANDS_CORE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: {{ .Values.secrets.coreTokenKey }}
            - name: CLOUDISLANDS_FORWARDING_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: {{ .Values.secrets.forwardingSecretKey }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cloudislands-lobby-paper
spec:
  serviceName: cloudislands-lobby-paper
  replicas: {{ .Values.lobby.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: lobby-paper
  template:
    metadata:
      labels:
        app.kubernetes.io/component: lobby-paper
    spec:
      containers:
        - name: paper
          image: "{{ .Values.images.paper.repository }}:{{ .Values.images.paper.tag }}"
          env:
            - name: CLOUDISLANDS_NODE_ID
              value: {{ .Values.lobby.nodeId | quote }}
            - name: CLOUDISLANDS_NODE_ROLE
              value: LOBBY
            - name: CLOUDISLANDS_VELOCITY_SERVER_NAME
              value: {{ .Values.lobby.serverName | quote }}
            - name: CLOUDISLANDS_CORE_API_BASE_URL
              value: http://cloudislands-core:{{ .Values.core.port }}
            - name: CLOUDISLANDS_CORE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: {{ .Values.secrets.coreTokenKey }}
          volumeMounts:
            - name: lobby-paper-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: lobby-paper-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.lobby.storage | quote }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cloudislands-island-paper
spec:
  serviceName: cloudislands-island-paper
  replicas: {{ .Values.islandPaper.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: island-paper
  template:
    metadata:
      labels:
        app.kubernetes.io/component: island-paper
    spec:
      containers:
        - name: paper
          image: "{{ .Values.images.paper.repository }}:{{ .Values.images.paper.tag }}"
          env:
            - name: CLOUDISLANDS_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: CLOUDISLANDS_NODE_ROLE
              value: ISLAND
            - name: CLOUDISLANDS_NODE_POOL
              value: {{ .Values.islandPaper.pool | quote }}
            - name: CLOUDISLANDS_VELOCITY_SERVER_NAME_PREFIX
              value: {{ .Values.islandPaper.serverNamePrefix | quote }}
            - name: CLOUDISLANDS_CORE_API_BASE_URL
              value: http://cloudislands-core:{{ .Values.core.port }}
            - name: CLOUDISLANDS_CORE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: {{ .Values.secrets.coreTokenKey }}
          volumeMounts:
            - name: island-paper-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: island-paper-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.islandPaper.storage | quote }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cloudislands-postgres
spec:
  serviceName: cloudislands-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.images.postgres.repository }}:{{ .Values.images.postgres.tag }}"
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: {{ .Values.secrets.databasePasswordKey }}
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgres.storage | quote }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cloudislands-redis
spec:
  serviceName: cloudislands-redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/component: redis
    spec:
      containers:
        - name: redis
          image: "{{ .Values.images.redis.repository }}:{{ .Values.images.redis.tag }}"
          ports:
            - name: redis
              containerPort: 6379
          command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)"]
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: {{ .Values.secrets.redisPasswordKey }}
          volumeMounts:
            - name: redis-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.redis.storage | quote }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cloudislands-object-storage
spec:
  serviceName: cloudislands-object-storage
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: object-storage
  template:
    metadata:
      labels:
        app.kubernetes.io/component: object-storage
    spec:
      containers:
        - name: minio
          image: "{{ .Values.images.objectStorage.repository }}:{{ .Values.images.objectStorage.tag }}"
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - name: s3
              containerPort: 9000
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: {{ .Values.secrets.storageAccessKeyKey }}
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: {{ .Values.secrets.storageSecretKeyKey }}
          volumeMounts:
            - name: object-storage-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: object-storage-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.objectStorage.storage | quote }}
