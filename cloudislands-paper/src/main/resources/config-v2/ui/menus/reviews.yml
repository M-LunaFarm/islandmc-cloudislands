id: island.reviews
rows: 6
title-key: menu.reviews.title
layout:
  - "_________"
  - "_________"
  - "_________"
  - "_________"
  - "12345D..E"
  - "P...R...M"
items:
  _:
    material: WRITABLE_BOOK
    name-key: reviews-menu-entry-name
    fallback-name: 섬 후기
    lore-keys:
      - reviews-menu-entry-rating
      - reviews-menu-entry-comment
    fallback-lore:
      - "평점과 후기를 확인합니다."
      - "후기는 Core 리뷰 API 기준입니다."
    action: list
  E:
    material: PAPER
    name-key: reviews-menu-empty-name
    fallback-name: 등록된 후기가 없습니다
    lore-keys:
      - reviews-menu-empty-lore
    fallback-lore:
      - "아직 등록된 후기가 없습니다."
    action: open
  1:
    material: RED_DYE
    name-key: reviews-menu-rate-1-name
    fallback-name: 1점 평가
    fallback-lore:
      - "현재 섬에 1점을 남깁니다."
    action: rate
    data:
      rating: 1
  2:
    material: ORANGE_DYE
    name-key: reviews-menu-rate-2-name
    fallback-name: 2점 평가
    fallback-lore:
      - "현재 섬에 2점을 남깁니다."
    action: rate
    data:
      rating: 2
  3:
    material: YELLOW_DYE
    name-key: reviews-menu-rate-3-name
    fallback-name: 3점 평가
    fallback-lore:
      - "현재 섬에 3점을 남깁니다."
    action: rate
    data:
      rating: 3
  4:
    material: LIME_DYE
    name-key: reviews-menu-rate-4-name
    fallback-name: 4점 평가
    fallback-lore:
      - "현재 섬에 4점을 남깁니다."
    action: rate
    data:
      rating: 4
  5:
    material: EMERALD
    name-key: reviews-menu-rate-5-name
    fallback-name: 5점 평가
    fallback-lore:
      - "현재 섬에 5점을 남깁니다."
    action: rate
    data:
      rating: 5
  D:
    material: BARRIER
    name-key: reviews-menu-delete-name
    fallback-name: 내 후기 삭제
    fallback-lore:
      - "현재 섬에 남긴 내 후기를 삭제합니다."
    action: delete
  P:
    material: GOLD_BLOCK
    name-key: reviews-menu-ranking-name
    fallback-name: 후기 랭킹
    lore-keys:
      - reviews-menu-ranking-command
    fallback-lore:
      - "/섬 랭킹"
    action: ranking
  R:
    material: CLOCK
    name-key: reviews-menu-refresh-name
    fallback-name: 새로고침
    lore-keys:
      - reviews-menu-refresh-command
    fallback-lore:
      - "/섬 후기"
    action: open
  M:
    material: COMPASS
    name-key: reviews-menu-main-menu-name
    fallback-name: 메인 메뉴
    lore-keys:
      - reviews-menu-main-menu-command
    fallback-lore:
      - "/섬 메뉴"
    action: back
actions:
  open: island.reviews.open
  list: island.reviews.open
  rate: island.review.set
  delete: island.review.delete
  ranking: island.ranking.open
  back: island.main.open
