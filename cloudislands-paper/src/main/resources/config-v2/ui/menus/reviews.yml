id: island.reviews
rows: 6
title-key: menu.reviews.title
layout:
  - "_________"
  - "_________"
  - "_________"
  - "_________"
  - "........."
  - "P...R...M"
items:
  _:
    material: WRITABLE_BOOK
    name-key: reviews-menu-entry-name
    fallback-name: 섬 후기
    lore-keys:
