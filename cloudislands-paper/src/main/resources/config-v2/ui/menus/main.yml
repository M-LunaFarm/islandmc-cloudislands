id: island.main
rows: 6
title-key: menu.main.title
layout:
  - "........."
  - ".H.C.W.V."
  - ".Y.M.P.S."
  - ".Q.U.B.R."
  - ".I.L.T.N."
  - ".E.....AD"
items:
  H:
    material: GRASS_BLOCK
    name-key: menu.main.home.name
    fallback-name: 내 섬으로 이동
    lore-keys:
      - main-menu-home-left
      - main-menu-home-right
    fallback-lore:
      - "좌클릭: /섬 홈"
      - "우클릭: /섬 홈관리"
    action: island.home
  C:
    material: OAK_SAPLING
    name-key: main-menu-create-name
    fallback-name: 섬 생성
    lore-keys:
      - main-menu-create-command
    fallback-lore:
      - "/섬 생성"
    action: island.create.open
  W:
    material: ENDER_PEARL
    name-key: menu.main.warps.name
    fallback-name: 섬 워프
    lore-keys:
      - main-menu-warp-command
    fallback-lore:
      - "/섬 워프"
    action: island.warps.open
  V:
    material: COMPASS
    name-key: menu.main.visit.name
    fallback-name: 섬 방문
    lore-keys:
      - main-menu-visit-left
      - main-menu-visit-right
    fallback-lore:
      - "좌클릭: 공개 섬 목록"
      - "우클릭: /섬 랜덤방문"
