id: island.flags
rows: 6
title-key: menu.flags.title
layout:
  - "_________"
  - "_________"
  - "_________"
  - "_________"
  - "_________"
  - "....R...S"
items:
  _:
    material: GRAY_DYE
    name-key: flag-menu-default-name
    fallback-name: 기본값
    action: set
  TRUE:
    material: LIME_DYE
    name-key: flag-menu-allow-name
    fallback-name: 허용
    action: set
  FALSE:
    material: RED_DYE
    name-key: flag-menu-deny-name
    fallback-name: 거부
    action: set
  R:
    material: CLOCK
    name-key: flag-menu-refresh-name
    fallback-name: 새로고침
    lore-keys:
      - flag-menu-refresh-command
    fallback-lore:
      - "/섬 플래그"
    action: open
  S:
    material: COMPARATOR
    name-key: flag-menu-settings-name
    fallback-name: 설정
    lore-keys:
      - flag-menu-settings-command
    fallback-lore:
      - "/섬 설정"
    action: back
actions:
  open: island.flags.open
  list: island.flags.list
  set: island.flag.set
  back: island.settings.open
