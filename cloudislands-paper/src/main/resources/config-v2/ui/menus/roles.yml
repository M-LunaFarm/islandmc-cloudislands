id: island.roles
rows: 3
title-key: menu.roles.title
layout:
  - "........."
  - "....E...."
  - "LPR.....S"
items:
  _:
    material: PAPER
    name-key: role-menu-entry-name
    fallback-name: 섬 역할
    action: adjust-weight
  CUSTOM:
    material: NAME_TAG
    name-key: role-menu-custom-name
    fallback-name: 커스텀 역할
    action: adjust-weight
  CO_OWNER:
    material: DIAMOND
    name-key: role-menu-co-owner-name
    fallback-name: 공동 소유자
    action: adjust-weight
  MODERATOR:
    material: IRON_SWORD
    name-key: role-menu-moderator-name
    fallback-name: 관리자
    action: adjust-weight
  TRUSTED:
    material: EMERALD
    name-key: role-menu-trusted-name
    fallback-name: 신뢰 멤버
    action: adjust-weight
  MEMBER:
    material: PLAYER_HEAD
    name-key: role-menu-member-name
    fallback-name: 멤버
    action: adjust-weight
  E:
    material: GRAY_DYE
    name-key: role-menu-empty-title
    fallback-name: 커스텀 역할 없음
    lore-keys:
      - role-menu-empty-example
    fallback-lore:
      - Core 역할 카탈로그가 비어 있습니다.
  L:
    material: PAPER
    name-key: role-menu-list-name
    fallback-name: 역할 목록
    lore-keys:
      - role-menu-list-lore
    fallback-lore:
      - Core 역할 카탈로그를 채팅에 출력합니다.
    action: list
  P:
    material: COMPARATOR
    name-key: role-menu-permission-name
    fallback-name: 권한 설정
    lore-keys:
      - role-menu-permission-lore
    fallback-lore:
      - 역할별 권한 매트릭스를 엽니다.
    action: permissions
  R:
    material: CLOCK
    name-key: role-menu-refresh-name
    fallback-name: 새로고침
    lore-keys:
      - role-menu-refresh-lore
    fallback-lore:
      - Core에서 역할을 다시 불러옵니다.
    action: open
  S:
    material: REDSTONE_TORCH
    name-key: role-menu-settings-name
    fallback-name: 설정
    lore-keys:
      - role-menu-settings-lore
    fallback-lore:
      - 섬 설정으로 돌아갑니다.
    action: settings
actions:
  open: island.roles.open
  list: island.roles.list
  adjust-weight: island.role.weight.adjust
  permissions: island.permissions.open
  settings: island.settings.open
