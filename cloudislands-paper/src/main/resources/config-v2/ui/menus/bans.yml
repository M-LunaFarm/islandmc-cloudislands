id: island.bans
rows: 6
title-key: menu.bans.title
layout:
  - "_________"
  - "_________"
  - "____E____"
  - "_________"
  - "_________"
  - "....R...S"
items:
  E:
    material: BARRIER
    name-key: ban-menu-empty-title
    fallback-name: 밴 기록 없음
    lore-keys:
      - ban-menu-empty
    fallback-lore:
      - 현재 밴된 방문자가 없습니다.
  _:
    material: BARRIER
    name-key: ban-menu-entry-name
    fallback-name: 밴 기록
    action: pardon-prepare
  PARDON:
    material: MILK_BUCKET
    name-key: ban-pardon-confirm-name
    fallback-name: 밴 해제
    action: pardon-confirm
  R:
    material: CLOCK
    name-key: ban-menu-refresh-name
    fallback-name: 새로고침
    lore-keys:
      - ban-menu-refresh-command
    fallback-lore:
      - "/섬 밴목록"
    action: open
  S:
    material: COMPARATOR
    name-key: ban-menu-settings-name
    fallback-name: 설정
    lore-keys:
      - ban-menu-settings-command
    fallback-lore:
      - "/섬 설정"
    action: settings
actions:
  open: island.bans.open
  list: island.bans.list
  pardon-prepare: island.ban.pardon.prepare
  pardon-confirm: island.ban.pardon.confirm
  back: island.members.open
  settings: island.settings.open
