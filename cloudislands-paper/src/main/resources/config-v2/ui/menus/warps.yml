id: island.warps
rows: 6
title-key: menu.warps.title
layout:
  - "........."
  - "........."
  - "........."
  - "........."
  - "........."
  - "W...S...M"
items:
  PRIVATE:
    material: ENDER_PEARL
    name-key: warp-menu-private-entry-name
    fallback-name: 비공개 워프
    action: teleport
  PUBLIC:
    material: ENDER_EYE
    name-key: warp-menu-public-entry-name
    fallback-name: 공개 워프
    action: teleport
  W:
    material: ENDER_PEARL
    name-key: warp-menu-set-current-name
    fallback-name: 현재 위치를 워프로 설정
    lore-keys:
      - warp-menu-set-usage
    fallback-lore:
      - "사용법: /섬 워프설정 <이름>"
    data:
      mode: set-current
  S:
    material: COMPARATOR
    name-key: warp-menu-settings-name
    fallback-name: 설정
    lore-keys:
      - warp-menu-settings-command
    fallback-lore:
      - "/섬 설정"
    action: settings
  M:
    material: COMPASS
    name-key: warp-menu-main-menu-name
    fallback-name: 메인 메뉴
    lore-keys:
      - warp-menu-main-menu-command
    fallback-lore:
      - "/섬 메뉴"
    action: back
actions:
  open: island.warps.open
  teleport: island.warp.teleport
  public-toggle: island.warp.public.toggle
  public: island.warp.public
  private: island.warp.private
  delete-prepare: island.warp.delete.prepare
  delete-confirm: island.warp.delete.confirm
  settings: island.settings.open
  back: island.main.open
