id: island.logs
rows: 4
title-key: menu.logs.title
layout:
  - "........."
  - "....E...."
  - "........."
  - "...MRS..X"
items:
  _:
    material: BOOK
    name-key: log-menu-entry-name
    fallback-name: 섬 로그
    action: detail
  BANK:
    material: GOLD_INGOT
    name-key: log-menu-bank-entry-name
    fallback-name: 은행 로그
    action: detail
  MEMBER:
    material: PLAYER_HEAD
    name-key: log-menu-member-entry-name
    fallback-name: 멤버 로그
    action: detail
  PERMISSION:
    material: REDSTONE_TORCH
    name-key: log-menu-permission-entry-name
    fallback-name: 권한 로그
    action: detail
  SNAPSHOT:
    material: CHEST
    name-key: log-menu-snapshot-entry-name
    fallback-name: 스냅샷 로그
    action: detail
  CHAT:
    material: WRITABLE_BOOK
    name-key: log-menu-chat-entry-name
    fallback-name: 채팅 로그
    action: detail
  E:
    material: BARRIER
    name-key: log-menu-empty-title
    fallback-name: 로그 없음
    lore-keys:
      - log-menu-empty
    fallback-lore:
      - 아직 기록된 섬 로그가 없습니다.
  M:
    material: COMPASS
    name-key: log-menu-main-menu-name
    fallback-name: 메인 메뉴
    lore-keys:
      - log-menu-main-menu-command
    fallback-lore:
      - "/섬 메뉴"
    action: main
  R:
    material: CLOCK
    name-key: log-menu-refresh-name
    fallback-name: 새로고침
    lore-keys:
      - log-menu-refresh-command
    fallback-lore:
      - "/섬 로그"
    action: open
  S:
    material: COMPARATOR
    name-key: log-menu-settings-name
    fallback-name: 설정
    lore-keys:
      - log-menu-settings-command
    fallback-lore:
      - "/섬 설정"
    action: settings
  X:
    material: OAK_DOOR
    name-key: log-menu-close-name
    fallback-name: 닫기
    lore-keys:
      - log-menu-close
    fallback-lore:
      - 메뉴를 닫습니다.
    action: close
actions:
  open: island.logs.open
  list: island.logs.list
  detail: island.log.detail
  main: island.main.open
  settings: island.settings.open
  back: island.chat.open
  close: gui.close
