    active-material: IRON_DOOR
    inactive-material: OAK_DOOR
    name-key: settings-menu-lock-name
    fallback-name: 잠금 설정
    lore-keys:
      - settings-menu-lock-left-click
      - settings-menu-lock-right-click
    fallback-lore:
      - "좌클릭: /섬 잠금해제"
      - "우클릭: /섬 잠금"
    action: lock-toggle
  M:
    material: NAME_TAG
    name-key: settings-menu-member-name
    fallback-name: 멤버 관리
    lore-keys:
      - settings-menu-member-command
