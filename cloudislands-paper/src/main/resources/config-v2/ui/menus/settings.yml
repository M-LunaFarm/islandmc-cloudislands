  public-toggle: island.public.toggle
  lock-toggle: island.lock.toggle
  members: island.members.open
  permissions: island.permissions.open
  flags: island.flags.open
  warps: island.warps.open
  bans: island.bans.open
  roles: island.roles.open
  bank: island.bank.open
  upgrades: island.upgrades.open
  limits: island.limits.open
  biome: island.biome.open
  snapshots: island.snapshots.open
  info: island.info.open
  warehouse: island.info.open
  reviews: island.ranking.open
  border: island.info.open
  danger: island.danger.open
  back: island.main.open
