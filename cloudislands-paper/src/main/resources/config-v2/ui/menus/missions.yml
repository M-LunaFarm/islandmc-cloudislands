      kind: MISSION
    action: open
  R:
    material: CLOCK
    name-key: mission-menu-refresh-name
    fallback-name: 새로고침
    action: open
  C:
    material: WRITABLE_BOOK
    name-key: mission-menu-challenge-name
    fallback-name: 챌린지 보기
    lore-keys:
      - mission-menu-challenge-command
    fallback-lore:
      - "/섬 챌린지"
    data:
      kind: CHALLENGE
    action: open
actions:
  open: island.missions.open
  complete: island.mission.complete
  back: island.main.open
