id: island.my-islands
rows: 6
title-key: menu.my-islands.title
layout:
  - "........."
  - "........."
  - "....E...."
  - "........."
  - "........."
  - "M..CR...V"
items:
  _:
    material: GRASS_BLOCK
    name-key: my-islands-menu-entry-name
    fallback-name: 내 섬
    action: visit
  OWNER:
    material: NETHER_STAR
    name-key: my-islands-menu-owner-name
    fallback-name: 소유한 섬
    action: visit
  CO_OWNER:
    material: DIAMOND
    name-key: my-islands-menu-co-owner-name
    fallback-name: 공동 소유 섬
    action: visit
  MODERATOR:
    material: IRON_SWORD
    name-key: my-islands-menu-moderator-name
    fallback-name: 관리 중인 섬
    action: visit
  TRUSTED:
    material: EMERALD
    name-key: my-islands-menu-trusted-name
    fallback-name: 신뢰된 섬
    action: visit
  E:
    material: BARRIER
    name-key: my-islands-menu-empty-title
    fallback-name: 섬 없음
    lore-keys:
      - my-islands-menu-empty
    fallback-lore:
      - 속한 섬이 없습니다.
  M:
    material: COMPASS
    name-key: my-islands-menu-main-menu-name
    fallback-name: 메인 메뉴
    lore-keys:
      - my-islands-menu-main-menu-command
    fallback-lore:
      - "/섬 메뉴"
    action: back
  C:
    material: OAK_SAPLING
    name-key: my-islands-menu-create-name
    fallback-name: 섬 생성
    lore-keys:
      - my-islands-menu-create-command
    fallback-lore:
      - "/섬 생성메뉴"
    action: create
  R:
    material: CLOCK
    name-key: my-islands-menu-refresh-name
    fallback-name: 새로고침
    lore-keys:
      - my-islands-menu-refresh-command
    fallback-lore:
      - "/섬 목록"
    action: open
  V:
    material: ENDER_PEARL
    name-key: my-islands-menu-public-islands-name
    fallback-name: 공개 섬
    lore-keys:
      - my-islands-menu-public-islands-command
    fallback-lore:
      - "/섬 방문"
    action: public
actions:
  open: island.list.open
  visit: island.visit.target
  create: island.create.open
  public: island.visit.open
  back: island.main.open
