name: CloudIslands
main: kr.lunaf.cloudislands.paper.CloudIslandsPaperPlugin
version: 0.1.0
api-version: '1.21'
author: LeeSeungmin
softdepend: [Vault]
commands:
  island:
    description: CloudIslands player island command
    usage: /island help
    permission: cloudislands.player
    permission-message: 섬 명령을 사용할 권한이 없습니다.
    aliases: [is, 섬]
  ciadmin:
    description: CloudIslands administration command
    usage: /ciadmin status
    permission: cloudislands.admin
    permission-message: 섬 관리 명령을 사용할 권한이 없습니다.
    aliases: [섬관리]
permissions:
  cloudislands.player:
    default: true
  cloudislands.admin:
    default: op
  cloudislands.admin.status:
    default: op
  cloudislands.admin.cache:
    default: op
  cloudislands.admin.node:
    default: op
  cloudislands.admin.island:
    default: op
  cloudislands.admin.player:
    default: op
  cloudislands.admin.jobs:
    default: op
  cloudislands.admin.route:
    default: op
  cloudislands.admin.rankings:
    default: op
  cloudislands.admin.events:
    default: op
  cloudislands.admin.audit:
    default: op
  cloudislands.admin.metrics:
    default: op
  cloudislands.admin.storage:
    default: op
  cloudislands.admin.block-values:
    default: op
  cloudislands.admin.upgrade-rules:
    default: op
  cloudislands.admin.templates:
    default: op
  cloudislands.admin.migrate-superiorskyblock2:
    default: op
  cloudislands.admin.reload:
    default: op
