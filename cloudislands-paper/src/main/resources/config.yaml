plugin:
  service-name: "CloudIslands"
  language: "ko_kr"

messages:
  use-actionbar: true
  use-bossbar-loading: true
  translations:
    tab-header: "{service}"
    tab-footer: "섬을 준비하고 있습니다. /섬 으로 이동과 관리를 시작하세요."
    tab-player-name: "{player}"
    join-message: "{player}님이 섬 서비스에 접속했습니다."
    quit-message: "{player}님이 섬 서비스에서 나갔습니다."
    server-brand: "{service}"
    chat-prefix: "[{service}] "
    chat-format: "{prefix}{player}: {message}"
    island-chat-format: "[섬] {actor}: {message}"
    team-chat-format: "[팀] {actor}: {message}"
    scoreboard-title: "{service}"
    route-loading-complete: "{target} 로딩 완료"
    route-loading-progress: "{target} 로딩 중 {progress}%"
    route-preparing-progress: "{target}을 준비하는 중입니다... {progress}%"
    route-ready: "잠시 후 {target}으로 이동합니다."
  scoreboard-lines:
    - "섬 이동: /섬"
    - "방문: /섬 방문"
    - "관리: /섬 설정"

node:
  id: "island-1"
  role: "ISLAND_NODE"
  pool: "island"
  velocity-server-name: "Island-1"
  soft-player-cap: 90
  hard-player-cap: 110
  reserved-slots: 15
  max-active-islands: 600
  supported-templates:
    - "*"

core-api:
  base-url: "https://core-api.internal:8443"
  auth-token: "${CI_CORE_TOKEN}"
  admin-token: "${CI_ADMIN_TOKEN}"
  timeout-ms: 3000

security:
  enforce-route-session: true
  require-velocity-forwarding: true
  forwarding-secret: "${VELOCITY_FORWARDING_SECRET}"
  proxy-source-allowlist: []
  allow-bungee-connect-plugin-messaging: false

redis:
  uri: "redis://redis.internal:6379"
  timeout-ms: 1000

storage:
  type: "S3"
  endpoint: "http://minio.internal:9000"
  bucket: "cloudislands"
  region: "us-east-1"
  local-path: "islands-storage"
  access-key: "${S3_ACCESS_KEY}"
  secret-key: "${S3_SECRET_KEY}"
  auth-token: "${S3_BEARER_TOKEN}"

generators:
  default-key: "default"

island-node:
  shard-world-prefix: "ci_shard_"
  shard-count: 4
  cell-size: 1024
  default-island-size: 300
  activation:
    max-concurrent: 4
    worker-interval-ticks: 20
    preload-radius: 4
    save-on-empty-after-seconds: 300
    periodic-save-seconds: 600
  level-scan-interval-seconds: 900

protection:
  cache-permissions: true
  cache-event-poll-ticks: 100
  deny-message-cooldown-ms: 1000
  deny-messages:
    build: "이 섬에서 블록을 설치할 권한이 없습니다."
    break: "이 섬에서 블록을 부술 권한이 없습니다."
    open-container: "이 섬에서 보관함을 열 권한이 없습니다."
    attack-player: "이 섬에서 플레이어를 공격할 수 없습니다."
    attack-mob: "이 섬에서 몹을 공격할 권한이 없습니다."
    pickup-item: "이 섬에서 아이템을 주울 권한이 없습니다."
    drop-item: "이 섬에서 아이템을 버릴 권한이 없습니다."

heartbeat:
  interval-ticks: 20
  timeout-seconds: 5

health:
  enabled: false
  bind-host: "127.0.0.1"
  port: 8787

routing:
  fallback-on-failure: "Lobby"
  wait-for-activation-timeout-seconds: 20
  require-route-session: true

snapshots:
  keep-hourly: 24
  keep-daily: 7
  keep-weekly: 4
  keep-manual: 50
  compress: true
  checksum: "SHA-256"
