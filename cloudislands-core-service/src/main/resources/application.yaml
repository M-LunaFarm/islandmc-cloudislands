server:
  bind: "0.0.0.0"
  port: 8443

setup:
  repository-mode: ""
  job-queue-mode: ""
  event-bus-mode: ""
  # Empty jdbc-url inherits database.jdbc-url. Otherwise use database-type + host/name below.
  jdbc-url: ""
  # database-type: POSTGRESQL. Core service repositories use PostgreSQL SQL.
  database-type: ""
  database-host: ""
  database-port: 0
  database-name: ""
  database-options: ""
  database-username: ""
  database-password: ""
  database-pool-size: 0
  redis-uri: ""
  storage-type: ""
  storage-endpoint: ""
  storage-bucket: ""
  storage-local-path: ""

database:
  jdbc-url: "jdbc:postgresql://postgres.internal:5432/cloudislands"
  username: "cloudislands"
  password: "${DB_PASSWORD}"
  pool-size: 20

redis:
  uri: "redis://redis.internal:6379"

storage:
  type: "S3"
  bucket: "cloudislands"

routing:
  island-pool: "island"
  heartbeat-timeout-seconds: 5
  lease-duration-seconds: 30
  route-ticket-ttl-seconds: 30
  route-preparing-ticket-ttl-seconds: 120
  soft-full-policy: "AVOID_NEW_ACTIVATIONS"
  hard-full-policy: "DENY_OR_QUEUE"
  migration-policy: "INACTIVE_ONLY_AUTOMATIC"

migration:
  superiorskyblock2-enabled: true

upgrades:
  file: "${CI_UPGRADES_FILE}"

block-values:
  file: "${CI_BLOCK_VALUES_FILE}"

snapshots:
  keep-hourly: 24
  keep-daily: 7
  keep-weekly: 4
  keep-manual: 50
  compress: true
  checksum: "SHA-256"

security:
  require-mtls: true
  mtls-verified-header: "X-SSL-Client-Verify"
  mtls-verified-value: "SUCCESS"
  admin-api-enabled: true
  ip-allowlist: ""
  core-token: "${CI_CORE_TOKEN}"
  admin-token: "${CI_ADMIN_TOKEN}"
