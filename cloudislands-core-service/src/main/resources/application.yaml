server:
  bind: "0.0.0.0"
  port: 8443

setup:
  repository-mode: ""
  job-queue-mode: ""
  event-bus-mode: ""
  # Preferred first-install database setup block. Legacy flat keys below still work.
  # Supported setup choices:
  # - POSTGRESQL: full Core JDBC repositories/jobs. Recommended for production.
  # - MYSQL/MARIADB: full Core JDBC repositories/jobs with dialect SQL and optional auto-schema bootstrap.
  # - CORE_API: client/API-only selection marker for external addon clients; the Core service itself still needs a durable JDBC backend or safe in-memory fallback.
  # Fallback rule: unsupported or incomplete setup selections do not crash startup; fallback.order is evaluated in order.
  # POSTGRESQL, MYSQL, or MARIADB can be used as durable Core JDBC. CORE_API is used for external client/addon state, then safe in-memory keeps the core online.
  database:
    # POSTGRESQL, MYSQL, and MARIADB enable Core JDBC repositories/jobs. CORE_API is a client/addon-state selection marker, not self-storage for this Core process.
    # Accepted aliases: POSTGRES/PG -> POSTGRESQL, MARIA -> MARIADB,
    # CORE/COREAPI/CLOUDISLANDS/CLOUDISLANDS_API -> CORE_API, MEMORY/LOCAL/LOCAL_SQLITE -> IN_MEMORY.
    # CI_DATABASE_TYPE overrides this value.
    type: ""
    # CI_JDBC_URL overrides this value. If empty, host/name/options are used when possible.
    jdbc-url: ""
    host: ""
    port: 0
    # name is the database/schema name. database is accepted as an alias by the loader.
    name: ""
    database: ""
    options: ""
    username: ""
    password: ""
    pool-size: 0
    # Explicit opt-in schema bootstrap for first PostgreSQL/MySQL/MariaDB Core JDBC setup.
    # Env override: CI_DB_AUTO_SCHEMA.
    auto-schema: false
    postgresql:
      # Type-specific values override the generic setup.database host/name/options values.
      # These credentials and pool values are used when the selected or fallback Core JDBC backend is PostgreSQL.
      url: ""
      jdbc-url: ""
      host: ""
      port: 0
      name: ""
      database: ""
      options: ""
      username: ""
      password: ""
      pool-size: 0
    mysql:
      # MySQL can be selected as the native Core JDBC backend. Use auto-schema only for first-install bootstrap.
      url: ""
      jdbc-url: ""
      host: ""
      port: 0
      name: ""
      database: ""
      options: ""
      username: ""
      password: ""
      pool-size: 0
    mariadb:
      # MariaDB can be selected as the native Core JDBC backend. Use auto-schema only for first-install bootstrap.
      url: ""
      jdbc-url: ""
      host: ""
      port: 0
      name: ""
      database: ""
      options: ""
      username: ""
      password: ""
      pool-size: 0
    core-api:
      # Optional selection marker for CORE_API setup. This is for external client/addon-state mode, not Core self-storage.
      enabled: false
      base-url: ""
      auth-token: ""
      admin-token: ""
      timeout-ms: 3000
    fallback:
      # Core JDBC supports PostgreSQL, MySQL, and MariaDB. Unsupported or incomplete setup choices stay online through the ordered fallback path.
      # Example: type=MYSQL with mysql.* configured uses MySQL for Core state.
      # Example: type=CORE_API with core-api.* configured keeps client/addon state pointed at Core API; the Core service uses the first durable JDBC fallback if configured.
      # If no durable fallback is available, in-memory keeps startup safe but is reported as non-production durable.
      # If disabled, Core still refuses unsafe unsupported JDBC startup and reports setupFallbackSafetyForced=true.
      # Env overrides: CI_DB_FALLBACK_ENABLED, CI_DB_FALLBACK_ORDER.
      enabled: true
      require-shared-before-local: true
      local-fallback-last: true
      production-safe-order: "POSTGRESQL,MYSQL,MARIADB,CORE_API,IN_MEMORY"
      order:
        - POSTGRESQL
        - MYSQL
        - MARIADB
        - CORE_API
        - UNSUPPORTED_JDBC
  # Empty jdbc-url inherits database.jdbc-url only for POSTGRESQL unless a typed setup.database.<backend> block is configured.
  # MYSQL/MARIADB can use setup.database.mysql|mariadb.host/name or CI_JDBC_URL.
  # CORE_API alone leaves Core JDBC disabled and reports dbBackend=NONE; with a configured durable fallback, Core uses that JDBC backend safely.
  jdbc-url: ""
  # database-type accepts POSTGRESQL, MYSQL, MARIADB, or CORE_API.
  # Accepted aliases: POSTGRES/PG -> POSTGRESQL, MARIA -> MARIADB,
  # CORE/COREAPI/CLOUDISLANDS/CLOUDISLANDS_API -> CORE_API, MEMORY/LOCAL/LOCAL_SQLITE -> IN_MEMORY.
  # Core service JDBC repositories support POSTGRESQL, MYSQL, and MARIADB. CORE_API is not used as Core self-storage.
  # If repository-mode/job-queue-mode is forced to JDBC with an unsupported JDBC URL, Core keeps the safe fallback active and reports jdbcFallbackActive=true.
  database-type: ""
  database-host: ""
  database-port: 0
  database-name: ""
  database-options: ""
  database-username: ""
  database-password: ""
  database-pool-size: 0
  redis-uri: ""
  storage-type: ""
  storage-endpoint: ""
  storage-bucket: ""
  storage-local-path: ""

database:
  jdbc-url: "jdbc:postgresql://postgres.internal:5432/cloudislands"
  username: "cloudislands"
  password: "${DB_PASSWORD}"
  pool-size: 20

redis:
  uri: "redis://redis.internal:6379"

storage:
  type: "S3"
  bucket: "cloudislands"

routing:
  island-pool: "island"
  heartbeat-timeout-seconds: 5
  lease-duration-seconds: 30
  route-ticket-ttl-seconds: 30
  route-preparing-ticket-ttl-seconds: 120
  soft-full-policy: "AVOID_NEW_ACTIVATIONS"
  hard-full-policy: "DENY_OR_QUEUE"
  migration-policy: "INACTIVE_ONLY_AUTOMATIC"

migration:
  superiorskyblock2-enabled: true

upgrades:
  file: "${CI_UPGRADES_FILE}"

block-values:
  file: "${CI_BLOCK_VALUES_FILE}"
  level-formula:
    type: "EXPRESSION"
    expression: "floor(total_level_points / 1000)"
  worth-formula:
    type: "SUM_BLOCK_VALUES"

snapshots:
  keep-hourly: 24
  keep-daily: 7
  keep-weekly: 4
  keep-manual: 50
  compress: true
  checksum: "SHA-256"

security:
  require-mtls: true
  mtls-verified-header: "X-SSL-Client-Verify"
  mtls-verified-value: "SUCCESS"
  admin-api-enabled: true
  ip-allowlist: ""
  core-token: "${CI_CORE_TOKEN}"
  admin-token: "${CI_ADMIN_TOKEN}"
