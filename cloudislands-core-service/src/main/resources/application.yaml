server:
  bind: "0.0.0.0"
  port: 8443

setup:
  repository-mode: ""
  job-queue-mode: ""
  event-bus-mode: ""
  # Preferred first-install database setup block. Legacy flat keys below still work.
  # Supported setup choices:
  # - POSTGRESQL: full Core JDBC repositories/jobs. Recommended for production.
  # - MYSQL/MARIADB: accepted for setup compatibility and external integrations. If setup.database.postgresql.* is present in fallback order, Core state falls back to PostgreSQL JDBC and uses the PostgreSQL credentials/pool.
  # - CORE_API: client/API-only selection marker. If setup.database.postgresql.* is present in fallback order, Core state falls back to PostgreSQL JDBC and uses the PostgreSQL credentials/pool.
  # Fallback rule: unsupported Core JDBC selections do not crash startup; fallback.order is evaluated in order.
  # POSTGRESQL is used when setup.database.postgresql.* is configured, CORE_API is used when core-api setup is configured, then safe in-memory keeps the core online.
  database:
    # POSTGRESQL enables Core JDBC repositories/jobs. MYSQL, MARIADB, and CORE_API can use setup.database.postgresql.* as a Core JDBC fallback.
    # CI_DATABASE_TYPE overrides this value.
    type: ""
    # CI_JDBC_URL overrides this value. If empty, host/name/options are used when possible.
    jdbc-url: ""
    host: ""
    port: 0
    # name is the database/schema name. database is accepted as an alias by the loader.
    name: ""
    database: ""
    options: ""
    username: ""
    password: ""
    pool-size: 0
    postgresql:
      # Type-specific values override the generic setup.database host/name/options values.
      # When MYSQL/MARIADB/CORE_API falls back to PostgreSQL, these credentials and pool values are used for Core JDBC.
      url: ""
      jdbc-url: ""
      host: ""
      port: 0
      name: ""
      database: ""
      options: ""
      username: ""
      password: ""
      pool-size: 0
    mysql:
      # MySQL can be configured for external integrations, but Core repositories still use safe non-JDBC fallback.
      url: ""
      jdbc-url: ""
      host: ""
      port: 0
      name: ""
      database: ""
      options: ""
      username: ""
      password: ""
      pool-size: 0
    mariadb:
      # MariaDB can be configured for external integrations, but Core repositories still use safe non-JDBC fallback.
      url: ""
      jdbc-url: ""
      host: ""
      port: 0
      name: ""
      database: ""
      options: ""
      username: ""
      password: ""
      pool-size: 0
    core-api:
      # Optional selection marker for CORE_API setup. Core JDBC stays disabled unless PostgreSQL fallback is configured.
      enabled: false
      base-url: ""
      auth-token: ""
      admin-token: ""
      timeout-ms: 3000
    fallback:
      # Core JDBC is PostgreSQL-only. Unsupported setup choices stay online through the ordered fallback path.
      # Example: type=MYSQL with postgresql.* configured uses PostgreSQL for Core state and still exposes MYSQL as the requested setup backend.
      # Example: type=CORE_API with core-api.* configured keeps the Core service in client-facing mode unless PostgreSQL fallback is configured.
      # If no durable fallback is available, in-memory keeps startup safe but is reported as non-production durable.
      # If disabled, Core still refuses unsafe unsupported JDBC startup and reports setupFallbackSafetyForced=true.
      # Env overrides: CI_DB_FALLBACK_ENABLED, CI_DB_FALLBACK_ORDER.
      enabled: true
      order:
        - POSTGRESQL
        - MYSQL
        - MARIADB
        - CORE_API
        - UNSUPPORTED_JDBC
  # Empty jdbc-url inherits database.jdbc-url only for POSTGRESQL.
  # MYSQL/MARIADB need database-type + host/name or CI_JDBC_URL.
  # CORE_API leaves Core JDBC disabled and reports dbBackend=NONE.
  jdbc-url: ""
  # database-type accepts POSTGRESQL, MYSQL, MARIADB, or CORE_API.
  # Core service JDBC repositories are PostgreSQL-only; MYSQL/MARIADB/CORE_API fall back to non-JDBC core repositories unless repository-mode is explicitly set.
  # If repository-mode/job-queue-mode is forced to JDBC with an unsupported JDBC URL, Core keeps the safe fallback active and reports jdbcFallbackActive=true.
  database-type: ""
  database-host: ""
  database-port: 0
  database-name: ""
  database-options: ""
  database-username: ""
  database-password: ""
  database-pool-size: 0
  redis-uri: ""
  storage-type: ""
  storage-endpoint: ""
  storage-bucket: ""
  storage-local-path: ""

database:
  jdbc-url: "jdbc:postgresql://postgres.internal:5432/cloudislands"
  username: "cloudislands"
  password: "${DB_PASSWORD}"
  pool-size: 20

redis:
  uri: "redis://redis.internal:6379"

storage:
  type: "S3"
  bucket: "cloudislands"

routing:
  island-pool: "island"
  heartbeat-timeout-seconds: 5
  lease-duration-seconds: 30
  route-ticket-ttl-seconds: 30
  route-preparing-ticket-ttl-seconds: 120
  soft-full-policy: "AVOID_NEW_ACTIVATIONS"
  hard-full-policy: "DENY_OR_QUEUE"
  migration-policy: "INACTIVE_ONLY_AUTOMATIC"

migration:
  superiorskyblock2-enabled: true

upgrades:
  file: "${CI_UPGRADES_FILE}"

block-values:
  file: "${CI_BLOCK_VALUES_FILE}"
  level-formula:
    type: "EXPRESSION"
    expression: "floor(total_level_points / 1000)"
  worth-formula:
    type: "SUM_BLOCK_VALUES"

snapshots:
  keep-hourly: 24
  keep-daily: 7
  keep-weekly: 4
  keep-manual: 50
  compress: true
  checksum: "SHA-256"

security:
  require-mtls: true
  mtls-verified-header: "X-SSL-Client-Verify"
  mtls-verified-value: "SUCCESS"
  admin-api-enabled: true
  ip-allowlist: ""
  core-token: "${CI_CORE_TOKEN}"
  admin-token: "${CI_ADMIN_TOKEN}"
